name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          sudo apt-get install -y xclip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller fishek.spec --noconfirm

      - name: Build RPM
        run: |
          sudo apt-get install -y rpm
          mkdir -p ~/rpmbuild/SOURCES/fishek
          mkdir -p ~/rpmbuild/SPECS
          cp -r dist/fishek/* ~/rpmbuild/SOURCES/fishek/
          cp assets/icon.png ~/rpmbuild/SOURCES/icon.png
          cp fishek.spec.rpm ~/rpmbuild/SPECS/fishek.spec
          rpmbuild -bb ~/rpmbuild/SPECS/fishek.spec

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: fishek-linux-rpm
          path: ~/rpmbuild/RPMS/x86_64/*.rpm

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller fishek.spec --noconfirm

      - name: Build installer with Inno Setup
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.4
        with:
          filepath: fishek.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: fishek-windows-installer
          path: output/*.exe