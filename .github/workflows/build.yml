name: Build-desktop-app

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux-desktop:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fishek-desktop
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get install -y xclip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller fishek.spec --noconfirm

      - name: Build RPM
        run: |
          sudo apt-get install -y rpm
          mkdir -p ~/rpmbuild/SOURCES/fishek
          mkdir -p ~/rpmbuild/SPECS
          cp -r dist/fishek/* ~/rpmbuild/SOURCES/fishek/
          cp assets/icon.png ~/rpmbuild/SOURCES/icon.png
          cp fishek.spec.rpm ~/rpmbuild/SPECS/fishek.spec
          rpmbuild -bb ~/rpmbuild/SPECS/fishek.spec

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: fishek-linux-rpm
          path: ~/rpmbuild/RPMS/x86_64/*.rpm

  build-windows-desktop:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: fishek-desktop
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller fishek.spec --noconfirm

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer with Inno Setup
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" fishek.iss'

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: fishek-windows-installer
          path: fishek-desktop/output/*.exe