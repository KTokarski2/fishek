plugins {
    id 'java'
    id 'application'
}

group = 'com.fishek'
version = '1.0'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.github.kwhat:jnativehook:2.2.2'
    implementation 'com.google.api-client:google-api-client:2.2.0'
    implementation 'com.google.oauth-client:google-oauth-client-jetty:1.34.1'
    implementation 'com.google.apis:google-api-services-sheets:v4-rev20230815-2.0.0'
}

application {
    mainClass = 'com.fishek.Main'
}

tasks.register('fatJar', Jar) {
    archiveClassifier.set('all') // wynikowy plik: fishek-desktop-all.jar

    manifest {
        attributes(
                'Main-Class': application.mainClass.get()
        )
    }

    // wszystkie klasy Twojego projektu
    from sourceSets.main.output

    // wszystkie zależności runtime
    dependsOn configurations.runtimeClasspath
    from {
        configurations.runtimeClasspath.filter { it.exists() }.collect { zipTree(it) }
    }

    // 🔹 Strategia duplikatów: jeśli plik się powtarza, użyj pierwszego
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}